name: windows-tools

# Builds the prebuilt Windows tool binaries the app bundles (the Unix tools with
# no Windows package) and publishes them to the `windows-tools` GitHub release,
# which is the download URL baked into WinSource::Bundle in
# crates/gwm-core/src/tools.rs. Cross-compiled on Linux with mingw-w64 — the same
# recipe as packaging/build-cpmtools-win64.sh, validated natively on the VM.
#
# Run manually (Actions → windows-tools → Run workflow) or by pushing a
# `windows-tools-*` tag. Re-running clobbers the release assets in place, so the
# installer URL is stable.

on:
  workflow_dispatch: {}
  push:
    tags: ["windows-tools-*"]

permissions:
  contents: write

jobs:
  cpmtools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mingw-w64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 zip
      - name: Build cpmtools-win64.zip
        run: HOST=x86_64-w64-mingw32 packaging/build-cpmtools-win64.sh dist
      - uses: actions/upload-artifact@v5
        with:
          name: cpmtools-win64
          path: dist/cpmtools-win64.zip
      - name: Publish to the windows-tools release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release once (idempotent), then upload/replace the asset.
          gh release view windows-tools >/dev/null 2>&1 \
            || gh release create windows-tools --title "Windows tool binaries" \
                 --notes "Prebuilt Windows binaries the app bundles (cpmtools, …). Rebuilt by the windows-tools workflow." \
                 --prerelease
          gh release upload windows-tools dist/cpmtools-win64.zip --clobber
