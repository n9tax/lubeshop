name: release

# Build prebuilt binaries for every supported OS and attach them to a GitHub
# Release whenever a version tag (v1.0.0, v1.1.0, …) is pushed. Testers get a
# ready-to-run binary with no Rust toolchain. Artifact names match the filenames
# the README's install steps tell users to download — keep them in sync.
#   Linux:   lubeshop-<tag>-x86_64-unknown-linux-{gnu,musl}.tar.gz, -aarch64-…-gnu
#   macOS:   lubeshop-<tag>-macos-{x86_64,aarch64}.tar.gz
#   Windows: lubeshop-<tag>-x86_64-pc-windows-msvc.zip
#   Debian:  lubeshop_<version>_amd64.deb

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc build — smallest, runs on any reasonably recent distro.
          - target: x86_64-unknown-linux-gnu
          # Fully static musl build — distro-agnostic, the safest thing to hand a
          # tester whose glibc might be older than the runner's.
          - target: x86_64-unknown-linux-musl
            apt: musl-tools
            cc: musl-gcc
          # 64-bit ARM (Raspberry Pi 4/5 and similar).
          - target: aarch64-unknown-linux-gnu
            apt: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            linker: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + target
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Install cross toolchain
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build lubeshop
        env:
          # The bundled SQLite (rusqlite) is compiled from C by the `cc` crate, so
          # cross targets need the matching compiler/linker. Empty vars are ignored.
          CC_x86_64_unknown_linux_musl: ${{ matrix.cc }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cc }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p gwm-tui

      - name: Package tarball
        run: |
          dist="lubeshop-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/lubeshop" "$dist/"
          cp README.md "$dist/"
          [ -f COPYING ] && cp COPYING "$dist/" || true
          [ -f THIRD-PARTY-NOTICES.md ] && cp THIRD-PARTY-NOTICES.md "$dist/" || true
          [ -f THIRD-PARTY-LICENSES.html ] && cp THIRD-PARTY-LICENSES.html "$dist/" || true
          tar czf "$dist.tar.gz" "$dist"
          sha256sum "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  macos:
    name: build macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel
            arch: x86_64
          - runner: macos-14   # Apple Silicon
            arch: aarch64
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup update stable --no-self-update
      # The Xcode Command Line Tools on the runners provide clang for rusqlite's
      # bundled SQLite — no extra setup needed.
      - name: Build lubeshop
        run: cargo build --release --locked -p gwm-tui
      - name: Package tarball
        run: |
          dist="lubeshop-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}"
          mkdir "$dist"
          cp target/release/lubeshop "$dist/"
          cp README.md "$dist/"
          [ -f COPYING ] && cp COPYING "$dist/" || true
          [ -f THIRD-PARTY-NOTICES.md ] && cp THIRD-PARTY-NOTICES.md "$dist/" || true
          [ -f THIRD-PARTY-LICENSES.html ] && cp THIRD-PARTY-LICENSES.html "$dist/" || true
          tar czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"
      - uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  windows:
    name: build windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup update stable --no-self-update
      # windows-latest ships the MSVC toolchain, so rusqlite's bundled SQLite
      # compiles with no extra setup.
      - name: Build lubeshop
        run: cargo build --release --locked -p gwm-tui
      - name: Package zip
        shell: bash
        run: |
          dist="lubeshop-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc"
          mkdir "$dist"
          cp target/release/lubeshop.exe "$dist/"
          cp README.md "$dist/"
          [ -f COPYING ] && cp COPYING "$dist/" || true
          [ -f THIRD-PARTY-NOTICES.md ] && cp THIRD-PARTY-NOTICES.md "$dist/" || true
          [ -f THIRD-PARTY-LICENSES.html ] && cp THIRD-PARTY-LICENSES.html "$dist/" || true
          # PowerShell's Compress-Archive makes a Windows-friendly zip.
          powershell -Command "Compress-Archive -Path '$dist' -DestinationPath '$dist.zip'"
          sha256sum "$dist.zip" > "$dist.zip.sha256"
      - uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64
          path: |
            *.zip
            *.zip.sha256

  deb:
    name: build .deb (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust + cargo-deb
        run: |
          rustup update stable --no-self-update
          cargo install cargo-deb --locked
      # Built on Ubuntu so dpkg-shlibdeps can fill in the real libc dependency
      # ($auto), which a build on a non-Debian host can't compute.
      - name: Build .deb
        run: cargo deb -p gwm-tui
      - uses: actions/upload-artifact@v5
        with:
          name: deb-amd64
          path: target/debian/*.deb

  release:
    name: publish release
    needs: [build, macos, windows, deb]
    runs-on: ubuntu-latest
    # Only publish on real version tags; a manual dispatch just builds artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create / update the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            || gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
